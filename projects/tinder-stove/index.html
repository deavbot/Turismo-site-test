<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tinder Stove — Hero Concept</title>
    <meta
      name="description"
      content="Tinder Stove hero concept page with a still-image opening section."
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              pine: '#0d140f',
              ember: '#c56a1a',
              ash: '#f4efe8'
            }
          }
        }
      };
    </script>
    <style>
      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        background: #0d140f;
        color: #f4efe8;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
    </style>
  </head>
  <body>
    <section class="relative min-h-screen overflow-hidden bg-pine">
      <img
        src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1800&q=80"
        alt="Camper by a campfire in the outdoors"
        class="absolute inset-0 h-full w-full object-cover"
      />
      <div class="absolute inset-0 bg-gradient-to-b from-black/20 via-black/30 to-black/70"></div>

      <a
        href="#next"
        class="absolute bottom-8 left-1/2 z-10 inline-flex -translate-x-1/2 items-center justify-center rounded-full border border-white/20 bg-white/10 px-4 py-2 text-xs font-semibold uppercase tracking-[0.25em] text-white/85 backdrop-blur transition hover:bg-white/20"
      >
        Scroll
      </a>
    </section>

    <section id="next" class="flex min-h-[25vh] items-center justify-center bg-pine px-6 py-16 text-center">
      <p class="max-w-2xl text-sm uppercase tracking-[0.3em] text-white/45">
        Next section intentionally left blank while we build the page section by section.
      </p>
    </section>
  </body>
</html>
